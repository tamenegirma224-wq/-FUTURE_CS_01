<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
    }

    .bar {
      height: 8px;
      width: 100%;
      background: #ddd;
      border-radius: 5px;
      margin-top: 10px;
      overflow: hidden;
    }

    .strength {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: 0.3s;
    }

    .weak { background: red; width: 33%; }
    .medium { background: orange; width: 66%; }
    .strong { background: green; width: 100%; }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Password Checker</h2>
  E-mail:<input type="text" id="email" placeholder="Enter Email" onkeyup="checkEmail()">
<p id="emailResult"></p>
Password:<input type="password" id="password" placeholder="Enter password" onkeyup="checkPassword()">

  <div class="bar">
    <div id="strengthBar" class="strength"></div>
  </div>

  <p id="message"></p>

  <button onclick="togglePassword()">Login</button>
</div>

<script src="script.js" >
</script>

</body>
</html>
